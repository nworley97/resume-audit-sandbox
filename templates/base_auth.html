<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
  {% include 'partials/fonts.html' %}
  <script src="{{ url_for('static', filename='js/loader.js') }}" defer></script>
</head>
<body class="bg-background min-h-screen flex flex-col">
  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div id="flash-messages" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 max-w-md" role="alert">
        {% for category, message in messages %}
          <div class="flash-msg flex items-start gap-3 px-4 py-3 rounded-lg shadow-lg border text-sm
            {% if category == 'error' %}bg-red-50 border-red-200 text-red-800
            {% elif category == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
            {% else %}bg-emerald-50 border-emerald-200 text-emerald-800{% endif %}"
            role="alert">
            <span class="flex-1">{{ message }}</span>
            <button type="button" onclick="this.parentElement.remove()" class="shrink-0 text-current opacity-50 hover:opacity-100">&times;</button>
          </div>
        {% endfor %}
      </div>
      <script>setTimeout(function(){var el=document.getElementById('flash-messages');if(el)el.style.transition='opacity 0.5s',el.style.opacity='0',setTimeout(function(){el.remove()},500)},6000);</script>
    {% endif %}
  {% endwith %}
  <!-- Loader Overlay -->
  <div id="loading-overlay"
       class="fixed inset-0 flex items-center justify-center bg-white bg-opacity-80 hidden opacity-0 transition-opacity duration-200 z-50">
    <div class="w-12 h-12 border-4 border-[#085CFF] border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div class="flex-1 flex items-center justify-center px-4 py-8">
    {% block content %}{% endblock %}
  </div>
  {% include 'partials/footer.html' %}
</body>
</html>
